<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>add course</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <header>
        <h1 text align="center">add new courses</h1>
    </header>
    <h2>fill the form below to add a new course:</h2>
    <main>
    <form>
        <div>
            <label>course name</label>
            <input type="text">
        </div>
        <br>
         <div>
            <label>instructor</label>
            <input type="text">
        </div>
        <br>
         <div>
            <label>course credit hours</label>
            <input type="number">
        </div>
        <br>
         <div>
            <label>additional notes</label>
            <input type="text">
        </div>
        <br>
        <div>
            <input type="submit">
            <input type="reset"value="empty form"> 
        </div>
    </form>
    </main>
    <h2>after adding a new course, make sure to track your progress and update your grades regularly to stay on top of your academic performance.</h2>
    <h2>Hope you are satisfied with your course selection!</h2>
    <footer>
        <p>&copy; 2026 Personal Course Organizer</p>
    </footer>

</body>
